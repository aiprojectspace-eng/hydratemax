<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONE CLEAR — FPS Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
canvas { display: block; width: 100vw; height: 100vh; }
#hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 24px; height: 24px; }
#crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.9); }
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
#crosshair-dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #f0c040; border-radius: 50%; transform: translate(-50%,-50%); }
#stats { position: absolute; top: 16px; left: 16px; font-size: 13px; line-height: 2; letter-spacing: 1px; }
#stats span { color: #f0c040; font-weight: bold; }
#ammo-wrap { position: absolute; bottom: 24px; right: 24px; text-align: right; }
#ammo { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
#ammo-label { font-size: 11px; color: #888; letter-spacing: 2px; margin-top: 2px; }
#health-bar-wrap { position: absolute; bottom: 24px; left: 24px; }
#health-label { font-size: 11px; color: #888; letter-spacing: 2px; margin-bottom: 6px; }
#health-bar { width: 180px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
#health-fill { height: 100%; width: 100%; background: #2ecc71; transition: width 0.15s, background 0.3s; border-radius: 4px; }
#reload-bar-wrap { position: absolute; bottom: 60px; left: 24px; display: none; }
#reload-label { font-size: 10px; color: #f0c040; letter-spacing: 2px; margin-bottom: 4px; }
#reload-bar { width: 180px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
#reload-fill { height: 100%; width: 0%; background: #f0c040; transition: width 0.05s linear; border-radius: 2px; }
#wave-banner { position: absolute; top: 45%; left: 50%; transform: translate(-50%,-50%); font-size: 36px; font-weight: bold; color: #f0c040; letter-spacing: 4px; opacity: 0; transition: opacity 0.4s; pointer-events: none; text-shadow: 0 0 30px rgba(240,192,64,0.5); }
#overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
#overlay h1 { font-size: 52px; color: #f0c040; letter-spacing: 6px; margin-bottom: 8px; }
#overlay .subtitle { font-size: 12px; color: #555; letter-spacing: 4px; margin-top: -16px; }
.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; margin: 8px 0; }
.ctrl { font-size: 13px; color: #666; }
.ctrl span { color: #aaa; }
#start-btn { margin-top: 16px; padding: 14px 48px; font-size: 15px; font-family: 'Courier New', monospace; background: transparent; color: #f0c040; border: 1px solid #f0c040; cursor: pointer; font-weight: bold; letter-spacing: 3px; transition: all 0.2s; }
#start-btn:hover { background: #f0c040; color: #111; }
#gameover { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
#gameover h1 { font-size: 52px; color: #e74c3c; letter-spacing: 6px; }
#go-details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 8px 0; }
.go-stat { text-align: center; padding: 12px 20px; border: 1px solid #333; }
.go-stat-val { font-size: 28px; color: #f0c040; font-weight: bold; }
.go-stat-label { font-size: 10px; color: #555; letter-spacing: 2px; margin-top: 4px; }
#restart-btn { padding: 14px 48px; font-size: 15px; font-family: 'Courier New', monospace; background: transparent; color: #e74c3c; border: 1px solid #e74c3c; cursor: pointer; font-weight: bold; letter-spacing: 3px; transition: all 0.2s; margin-top: 8px; }
#restart-btn:hover { background: #e74c3c; color: #fff; }
#hit-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(231,76,60,0); pointer-events: none; transition: background 0.08s; }
#shoot-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,200,0); pointer-events: none; transition: background 0.06s; }
#minimap { position: absolute; top: 16px; right: 16px; border: 1px solid #333; border-radius: 2px; }
#pointer-hint { position: absolute; bottom: 50%; left: 50%; transform: translate(-50%, 50%); font-size: 11px; color: #555; letter-spacing: 2px; }
#reloading-text { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 13px; color: #f0c040; letter-spacing: 3px; display: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div id="crosshair"><div id="crosshair-dot"></div></div>
  <div id="stats">
    <div>WAVE &nbsp;<span id="wave-num">1</span></div>
    <div>SCORE <span id="score">0</span></div>
    <div>KILLS &nbsp;<span id="kills">0</span></div>
  </div>
  <canvas id="minimap" width="110" height="110"></canvas>
  <div id="health-bar-wrap">
    <div id="health-label">HEALTH</div>
    <div id="health-bar"><div id="health-fill"></div></div>
  </div>
  <div id="reload-bar-wrap">
    <div id="reload-label">RELOADING</div>
    <div id="reload-bar"><div id="reload-fill"></div></div>
  </div>
  <div id="ammo-wrap">
    <div id="ammo">30 / 90</div>
    <div id="ammo-label">AMMO</div>
  </div>
  <div id="wave-banner"></div>
  <div id="hit-flash"></div>
  <div id="shoot-flash"></div>
  <div id="pointer-hint">CLICK TO LOCK MOUSE</div>
  <div id="reloading-text">RELOADING...</div>
</div>

<div id="overlay">
  <h1>ZONE CLEAR</h1>
  <p class="subtitle">SURVIVE THE WAVES</p>
  <div class="controls-grid">
    <div class="ctrl"><span>WASD</span> — Move</div>
    <div class="ctrl"><span>MOUSE</span> — Look</div>
    <div class="ctrl"><span>LMB</span> — Shoot</div>
    <div class="ctrl"><span>R</span> — Reload</div>
    <div class="ctrl"><span>SHIFT</span> — Sprint</div>
    <div class="ctrl"><span>ESC</span> — Unlock mouse</div>
  </div>
  <button id="start-btn">[ START GAME ]</button>
</div>

<div id="gameover">
  <h1>YOU DIED</h1>
  <div id="go-details">
    <div class="go-stat"><div class="go-stat-val" id="go-score">0</div><div class="go-stat-label">SCORE</div></div>
    <div class="go-stat"><div class="go-stat-val" id="go-kills">0</div><div class="go-stat-label">KILLS</div></div>
    <div class="go-stat"><div class="go-stat-val" id="go-wave">1</div><div class="go-stat-label">WAVE</div></div>
  </div>
  <button id="restart-btn">[ PLAY AGAIN ]</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimap');
const miniCtx = miniCanvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const MAP_W = 24, MAP_H = 24, CELL = 64;
const map = [];
const rooms = [[2,2,8,8],[12,2,20,8],[2,12,8,20],[12,12,20,20],[9,9,14,14]];
for (let y = 0; y < MAP_H; y++) {
  map[y] = [];
  for (let x = 0; x < MAP_W; x++) {
    if (x===0||y===0||x===MAP_W-1||y===MAP_H-1) { map[y][x]=1; continue; }
    let inRoom = false;
    for (const [rx,ry,rx2,ry2] of rooms) if (x>=rx&&x<=rx2&&y>=ry&&y<=ry2) { inRoom=true; break; }
    if (inRoom) { map[y][x]=0; continue; }
    if ((x===8||x===12||x===20)&&(y>1&&y<MAP_H-1)) { map[y][x]=0; continue; }
    if ((y===8||y===12||y===20)&&(x>1&&x<MAP_W-1)) { map[y][x]=0; continue; }
    map[y][x]=1;
  }
}

const player = {x:2.5*CELL,y:2.5*CELL,angle:0,health:100,maxHealth:100,ammo:30,maxAmmo:30,reserve:90,speed:3.0,score:0,kills:0};
const keys = {};
let enemies=[],bullets=[],particles=[];
let wave=1,gameActive=false,reloading=false,reloadProgress=0,reloadTotal=90;
let shootCooldown=0,mouseLocked=false;

function spawnWave(w) {
  const count = 3 + w*2;
  for (let i=0;i<count;i++) {
    let ex,ey,tries=0;
    do {
      ex=(1+Math.floor(Math.random()*(MAP_W-2)))*CELL+CELL/2;
      ey=(1+Math.floor(Math.random()*(MAP_H-2)))*CELL+CELL/2;
      tries++;
    } while((isSolid(ex,ey)||dist(ex,ey,player.x,player.y)<250)&&tries<100);
    enemies.push({x:ex,y:ey,angle:0,health:30+w*12,maxHealth:30+w*12,speed:0.75+w*0.08,shootTimer:60+Math.random()*80,hitFlash:0,type:w>3&&Math.random()<0.3?'heavy':'normal'});
  }
}

function dist(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }

function isSolid(x,y) {
  const gx=Math.floor(x/CELL),gy=Math.floor(y/CELL);
  if(gx<0||gy<0||gx>=MAP_W||gy>=MAP_H) return true;
  return map[gy][gx]===1;
}

function moveEntity(e,dx,dy) {
  const r=18;
  if(!isSolid(e.x+dx+Math.sign(dx)*r,e.y)) e.x+=dx;
  if(!isSolid(e.x,e.y+dy+Math.sign(dy)*r)) e.y+=dy;
}

const RAYS=480, FOV=Math.PI/2.4;

function castRay(angle) {
  const cos=Math.cos(angle),sin=Math.sin(angle);
  let rx=player.x,ry=player.y;
  for(let s=1;s<700;s+=2) {
    rx+=cos*2; ry+=sin*2;
    const gx=Math.floor(rx/CELL),gy=Math.floor(ry/CELL);
    if(gx<0||gy<0||gx>=MAP_W||gy>=MAP_H||map[gy][gx]===1) return {d:s};
  }
  return {d:700};
}

const floorCols = ['#1a1a1a','#1c1c1c','#181818','#202020'];
const ceilCols  = ['#0d1520','#0e1825','#0c1318','#101b28'];

function drawScene() {
  for(let y=0;y<H;y++) {
    const t=y/H;
    if(y<H/2) {
      const ci=Math.floor(t*ceilCols.length*2)%ceilCols.length;
      ctx.fillStyle=ceilCols[ci];
    } else {
      const fi=Math.floor((t-0.5)*floorCols.length*2)%floorCols.length;
      ctx.fillStyle=floorCols[fi];
    }
    ctx.fillRect(0,y,W,1);
  }

  for(let i=0;i<RAYS;i++) {
    const angle=player.angle-FOV/2+(i/RAYS)*FOV;
    const {d}=castRay(angle);
    const fixedD=d*Math.cos(angle-player.angle);
    const wallH=Math.min(H,(CELL/fixedD)*(W*0.85));
    const shade=Math.max(20,Math.min(200,220-fixedD*0.4));
    const wallX=(i/RAYS)*W;
    const wallY=(H-wallH)/2;
    ctx.fillStyle=`rgb(${Math.floor(shade*0.35)},${Math.floor(shade*0.38)},${Math.floor(shade*0.55)})`;
    ctx.fillRect(wallX,wallY,W/RAYS+1.2,wallH);
    const edgeShade=Math.max(10,shade-40);
    ctx.fillStyle=`rgb(${Math.floor(edgeShade*0.2)},${Math.floor(edgeShade*0.22)},${Math.floor(edgeShade*0.35)})`;
    ctx.fillRect(wallX,wallY,1,wallH);
  }

  const zbuf=new Float32Array(RAYS);
  for(let i=0;i<RAYS;i++) {
    const angle=player.angle-FOV/2+(i/RAYS)*FOV;
    zbuf[i]=castRay(angle).d*Math.cos(angle-player.angle);
  }

  const spriteData=[];
  for(const e of enemies) {
    const dx=e.x-player.x,dy=e.y-player.y;
    const d=Math.hypot(dx,dy);
    let sa=Math.atan2(dy,dx)-player.angle;
    while(sa>Math.PI) sa-=2*Math.PI;
    while(sa<-Math.PI) sa+=2*Math.PI;
    if(Math.abs(sa)<FOV*0.7) spriteData.push({e,d,sa});
  }
  spriteData.sort((a,b)=>b.d-a.d);

  for(const {e,d,sa} of spriteData) {
    const screenX=(0.5+sa/FOV)*W;
    const sprH=Math.min(H*1.2,(CELL/d)*(W*0.85));
    const sx=screenX-sprH/2,sy=(H-sprH)/2;
    const hpRatio=e.health/e.maxHealth;
    const colI=Math.floor(screenX/W*RAYS);
    if(colI>=0&&colI<RAYS&&zbuf[colI]>d) {
      const baseR=e.hitFlash>0?255:e.type==='heavy'?180:200;
      const baseG=e.hitFlash>0?80:Math.floor(180*hpRatio);
      const baseB=e.hitFlash>0?80:e.type==='heavy'?40:60;
      ctx.fillStyle=`rgba(${baseR},${baseG},${baseB},0.92)`;
      ctx.fillRect(sx,sy+sprH*0.1,sprH*0.8,sprH*0.8);
      ctx.fillStyle='rgba(0,0,0,0.7)';
      ctx.fillRect(sx+sprH*0.2,sy+sprH*0.18,sprH*0.15,sprH*0.12);
      ctx.fillRect(sx+sprH*0.45,sy+sprH*0.18,sprH*0.15,sprH*0.12);
      const hbW=sprH*0.8,hbH=5;
      ctx.fillStyle='#333'; ctx.fillRect(sx,sy-8,hbW,hbH);
      ctx.fillStyle=hpRatio>0.5?'#2ecc71':hpRatio>0.25?'#f39c12':'#e74c3c';
      ctx.fillRect(sx,sy-8,hbW*hpRatio,hbH);
    }
  }

  const gunW=120,gunH=140;
  const gunBob=Math.sin(Date.now()*0.006)*(keys['w']||keys['s']||keys['a']||keys['d']?4:1);
  ctx.fillStyle='#5a4030';
  ctx.fillRect(W/2-gunW/2,H-gunH-10+gunBob,gunW,gunH);
  ctx.fillStyle='#3a2820';
  ctx.fillRect(W/2-10,H-gunH-10+gunBob,20,30);
  ctx.fillStyle='#888';
  ctx.fillRect(W/2-6,H-gunH-20+gunBob,12,14);
  ctx.fillStyle='#4a3828';
  ctx.fillRect(W/2-gunW/2,H-gunH+20+gunBob,gunW,14);
}

function drawMinimap() {
  miniCtx.clearRect(0,0,110,110);
  const scale=110/(MAP_W*CELL);
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++) {
    miniCtx.fillStyle=map[y][x]?'#444':'#111';
    miniCtx.fillRect(x*CELL*scale,y*CELL*scale,CELL*scale+0.5,CELL*scale+0.5);
  }
  for(const e of enemies) {
    miniCtx.fillStyle=e.type==='heavy'?'#ff8c00':'#e74c3c';
    miniCtx.fillRect(e.x*scale-2.5,e.y*scale-2.5,5,5);
  }
  miniCtx.fillStyle='#f0c040';
  miniCtx.save();
  miniCtx.translate(player.x*scale,player.y*scale);
  miniCtx.rotate(player.angle);
  miniCtx.fillRect(-3,-4,6,8);
  miniCtx.fillStyle='#fff';
  miniCtx.fillRect(-1,-6,2,4);
  miniCtx.restore();
}

function updateHUD() {
  document.getElementById('wave-num').textContent=wave;
  document.getElementById('score').textContent=player.score.toLocaleString();
  document.getElementById('kills').textContent=player.kills;
  document.getElementById('ammo').textContent=`${player.ammo} / ${player.reserve}`;
  const hp=player.health/player.maxHealth;
  const fill=document.getElementById('health-fill');
  fill.style.width=(hp*100)+'%';
  fill.style.background=hp>0.5?'#2ecc71':hp>0.25?'#f39c12':'#e74c3c';
  if(reloading) {
    document.getElementById('reload-bar-wrap').style.display='block';
    document.getElementById('reloading-text').style.display='block';
    document.getElementById('reload-fill').style.width=(reloadProgress/reloadTotal*100)+'%';
  } else {
    document.getElementById('reload-bar-wrap').style.display='none';
    document.getElementById('reloading-text').style.display='none';
  }
  document.getElementById('pointer-hint').style.display=mouseLocked?'none':'block';
}

function shoot() {
  if(!gameActive||shootCooldown>0||reloading) return;
  if(player.ammo<=0) { startReload(); return; }
  player.ammo--;
  shootCooldown=10;
  const sf=document.getElementById('shoot-flash');
  sf.style.background='rgba(255,255,200,0.2)';
  setTimeout(()=>sf.style.background='rgba(255,255,200,0)',60);
  for(let s=0;s<2;s++) {
    const spread=(Math.random()-0.5)*0.06;
    bullets.push({x:player.x,y:player.y,angle:player.angle+spread,speed:15,life:55,owner:'player'});
  }
  for(let p=0;p<4;p++) {
    particles.push({x:player.x+Math.cos(player.angle)*25,y:player.y+Math.sin(player.angle)*25,
      vx:Math.cos(player.angle+(Math.random()-0.5)*0.5)*4,
      vy:Math.sin(player.angle+(Math.random()-0.5)*0.5)*4,
      life:12,color:'#ffcc44',size:2+Math.random()*2});
  }
  updateHUD();
}

function startReload() {
  if(reloading||player.reserve<=0||player.ammo===player.maxAmmo) return;
  reloading=true; reloadProgress=0;
}

function takeDamage(amt) {
  player.health=Math.max(0,player.health-amt);
  const hf=document.getElementById('hit-flash');
  hf.style.background='rgba(231,76,60,0.3)';
  setTimeout(()=>hf.style.background='rgba(231,76,60,0)',180);
  updateHUD();
  if(player.health<=0) endGame();
}

function endGame() {
  gameActive=false;
  document.getElementById('go-score').textContent=player.score.toLocaleString();
  document.getElementById('go-kills').textContent=player.kills;
  document.getElementById('go-wave').textContent=wave;
  document.getElementById('gameover').style.display='flex';
  document.exitPointerLock();
}

function showWaveBanner(text) {
  const banner=document.getElementById('wave-banner');
  banner.textContent=text; banner.style.opacity=1;
  setTimeout(()=>banner.style.opacity=0,2000);
}

function update() {
  if(!gameActive) return;
  if(shootCooldown>0) shootCooldown--;
  if(reloading) {
    reloadProgress++;
    if(reloadProgress>=reloadTotal) {
      const needed=player.maxAmmo-player.ammo;
      const got=Math.min(needed,player.reserve);
      player.ammo+=got; player.reserve-=got;
      reloading=false;
      updateHUD();
    }
  }

  const sprint=keys['shift']?1.6:1;
  const speed=player.speed*sprint;
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup']){dx+=Math.cos(player.angle)*speed;dy+=Math.sin(player.angle)*speed;}
  if(keys['s']||keys['arrowdown']){dx-=Math.cos(player.angle)*speed;dy-=Math.sin(player.angle)*speed;}
  if(keys['a']||keys['arrowleft']){dx+=Math.cos(player.angle-Math.PI/2)*speed;dy+=Math.sin(player.angle-Math.PI/2)*speed;}
  if(keys['d']||keys['arrowright']){dx+=Math.cos(player.angle+Math.PI/2)*speed;dy+=Math.sin(player.angle+Math.PI/2)*speed;}
  moveEntity(player,dx,dy);

  for(const e of enemies) {
    if(e.hitFlash>0) e.hitFlash--;
    const edx=player.x-e.x,edy=player.y-e.y;
    const ed=Math.hypot(edx,edy);
    e.angle=Math.atan2(edy,edx);
    const es=e.type==='heavy'?e.speed*0.7:e.speed;
    if(ed>35) moveEntity(e,(edx/ed)*es,(edy/ed)*es);
    else takeDamage(e.type==='heavy'?0.25:0.12);
    e.shootTimer--;
    if(e.shootTimer<=0&&ed<350) {
      e.shootTimer=e.type==='heavy'?50:70+Math.random()*50;
      const shots=e.type==='heavy'?3:1;
      for(let s=0;s<shots;s++) {
        const ba=e.angle+(Math.random()-0.5)*0.25;
        bullets.push({x:e.x,y:e.y,angle:ba,speed:e.type==='heavy'?7:9,life:80,owner:'enemy',dmg:e.type==='heavy'?12:8});
      }
    }
  }

  for(let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    b.x+=Math.cos(b.angle)*b.speed;
    b.y+=Math.sin(b.angle)*b.speed;
    b.life--;
    if(b.life<=0||isSolid(b.x,b.y)){bullets.splice(i,1);continue;}
    if(b.owner==='player') {
      let hit=false;
      for(let j=enemies.length-1;j>=0;j--) {
        if(dist(b.x,b.y,enemies[j].x,enemies[j].y)<22) {
          enemies[j].health-=22+Math.floor(Math.random()*10);
          enemies[j].hitFlash=8;
          hit=true;
          if(enemies[j].health<=0) {
            player.score+=enemies[j].type==='heavy'?250*wave:100*wave;
            player.kills++;
            for(let p=0;p<8;p++) {
              const pa=Math.random()*Math.PI*2;
              particles.push({x:enemies[j].x,y:enemies[j].y,vx:Math.cos(pa)*3,vy:Math.sin(pa)*3,life:20,color:enemies[j].type==='heavy'?'#ff8c00':'#e74c3c',size:3});
            }
            enemies.splice(j,1);
            updateHUD();
          }
          break;
        }
      }
      if(hit) {bullets.splice(i,1);continue;}
    } else {
      if(dist(b.x,b.y,player.x,player.y)<18) {
        takeDamage(b.dmg||8);
        bullets.splice(i,1);
      }
    }
  }

  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }

  if(enemies.length===0&&gameActive) {
    gameActive=false;
    showWaveBanner(`WAVE ${wave} CLEAR!`);
    setTimeout(()=>{
      wave++;
      const healAmt=Math.min(30,player.maxHealth-player.health);
      player.health+=healAmt;
      player.ammo=player.maxAmmo;
      player.reserve=Math.min(player.reserve+60,180);
      spawnWave(wave);
      showWaveBanner(`WAVE ${wave}`);
      gameActive=true;
      updateHUD();
    },2200);
  }
}

function render() {
  drawScene();
  drawMinimap();
}

function loop() {
  update();
  if(gameActive||document.getElementById('gameover').style.display==='none') render();
  requestAnimationFrame(loop);
}

canvas.addEventListener('click',()=>{canvas.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>{
  mouseLocked=document.pointerLockElement===canvas;
  updateHUD();
});
document.addEventListener('mousemove',e=>{
  if(!gameActive||document.pointerLockElement!==canvas) return;
  player.angle+=e.movementX*0.0025;
});
document.addEventListener('mousedown',e=>{if(e.button===0) shoot();});
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='r') startReload();
  if(e.key===' ') { e.preventDefault(); shoot(); }
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

function startGame() {
  player.health=100; player.ammo=30; player.reserve=90;
  player.score=0; player.kills=0;
  player.x=2.5*CELL; player.y=2.5*CELL; player.angle=0;
  wave=1; enemies=[]; bullets=[]; particles=[];
  reloading=false; reloadProgress=0;
  gameActive=true;
  spawnWave(wave);
  showWaveBanner('WAVE 1');
  updateHUD();
  canvas.requestPointerLock();
}

document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  startGame();
});
document.getElementById('restart-btn').addEventListener('click',()=>{
  document.getElementById('gameover').style.display='none';
  startGame();
});

loop();
</script>
</body>
</html>
