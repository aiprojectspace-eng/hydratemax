<!DOCTYPE html>
<html>
<head>
    <title>Knight POV: Blood & Steel</title>
    <style>
        :root {
            --iron: #71717a;
            --blood: #991b1b;
        }

        body {
            margin: 0; background: #000; overflow: hidden;
            font-family: 'Georgia', serif;
        }

        #game-stage {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
            background: radial-gradient(circle, #27272a 0%, #09090b 100%);
        }

        /* Pedang Knight */
        #sword {
            position: absolute; bottom: -50px; right: 10%;
            width: 300px; height: 500px;
            background: url('https://img.icons8.com/color/480/longsword.png') no-repeat center;
            background-size: contain;
            transform: rotate(-15deg);
            transition: transform 0.1s;
            pointer-events: none;
            z-index: 100;
        }

        /* Animation Hayun Pedang */
        .swing {
            animation: slash 0.3s ease-out;
        }

        @keyframes slash {
            0% { transform: rotate(-15deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(-100px) translateX(-200px); filter: brightness(1.5); }
            100% { transform: rotate(-15deg) translateY(0); }
        }

        /* Musuh (Enemy) */
        .enemy {
            position: absolute;
            width: 200px; height: 300px;
            background: url('https://img.icons8.com/color/480/knight.png') no-repeat center;
            background-size: contain;
            filter: grayscale(1) sepia(1) drop-shadow(0 0 10px red);
            transition: transform 3s linear; /* Musuh mara */
        }

        .hit-effect {
            animation: flash 0.2s;
        }

        @keyframes flash {
            from { filter: brightness(5); }
            to { filter: brightness(1); }
        }

        #ui {
            position: absolute; top: 20px; color: gold; font-size: 24px;
            text-align: center; width: 100%; text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body onclick="attack()">

    <div id="ui">
        <div>KILLS: <span id="score">0</span></div>
        <small>CLICK TO SLASH THE INVADER</small>
    </div>

    <div id="game-stage">
        <div id="enemy-container"></div>
        <div id="sword"></div>
    </div>

    <script>
        let score = 0;
        const sword = document.getElementById('sword');
        const container = document.getElementById('enemy-container');

        function attack() {
            // Play Animation
            sword.classList.remove('swing');
            void sword.offsetWidth; // Trigger reflow
            sword.classList.add('swing');

            // Hit Logic
            const enemies = document.querySelectorAll('.enemy');
            enemies.forEach(en => {
                const scale = new DOMMatrix(getComputedStyle(en).transform).a;
                if (scale > 2.5) { // Musuh dah dekat baru boleh hit
                    en.classList.add('hit-effect');
                    setTimeout(() => {
                        en.remove();
                        score++;
                        document.getElementById('score').innerText = score;
                        spawnEnemy();
                    }, 100);
                }
            });
        }

        function spawnEnemy() {
            const en = document.createElement('div');
            en.classList.add('enemy');
            en.style.transform = "scale(0.1)"; // Mula dari jauh
            container.appendChild(en);

            // Start mara ke depan
            setTimeout(() => {
                en.style.transform = "scale(4)";
            }, 100);

            // Kalau tak bunuh dalam 3 saat, Game Over
            setTimeout(() => {
                if (en.parentElement) {
                    alert("THY ART DEAD! Final Kills: " + score);
                    location.reload();
                }
            }, 3100);
        }

        spawnEnemy();
    </script>
</body>
</html>
